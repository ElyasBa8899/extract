<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
</head>
<body>
    <h1>Edit Product</h1>
    <form action="/update/{{ product.id }}" method="post">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" value="{{ product.name }}"><br>
        <label for="price">Price:</label><br>
        <input type="text" id="price" name="price" value="{{ product.price }}"><br>
        <label for="description">Description:</label><br>
        <textarea id="description" name="description">{{ product.description }}</textarea><br><br>
        <input type="submit" value="Submit">
    </form>

    <h2>Variations</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>
        {% for variation in variations %}
        <tr>
            <td>{{ variation.attributes[0].option }}</td>
            <td><input type="text" name="variation_price_{{ variation.id }}" value="{{ variation.price }}"></td>
            <td><input type="submit" value="Update Price"></td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
